version: "3.9"

services:

  samruddhi-api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: samruddhi_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/tools/health"]
      interval: 30s
      timeout: 10s
      retries: 5

    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs

  hft2-backend:
    build:
      context: ./backend/hft2/backend
      dockerfile: Dockerfile

    container_name: hft2_backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      - samruddhi-api

  trading-dashboard:
    build:
      context: ./trading-dashboard
      dockerfile: Dockerfile

    container_name: trading_dashboard

    ports:
      - "5173:5173"

    restart: unless-stopped

    depends_on:
      - samruddhi-api